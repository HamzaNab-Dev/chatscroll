name: Deploy Backend to AWS ECS

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPO: 294699501138.dkr.ecr.us-east-1.amazonaws.com/chatscroll-api
        run: |
          docker build \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            -t $ECR_REPO:latest \
            -t $ECR_REPO:${{ github.sha }} \
            ./backend

          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}

          echo "Pushed image tags:"
          echo "  $ECR_REPO:latest"
          echo "  $ECR_REPO:${{ github.sha }}"

      - name: Force ECS service redeployment
        run: |
          aws ecs update-service \
            --cluster default \
            --service chatscroll-api \
            --force-new-deployment \
            --region us-east-1

