name: Deploy Backend to AWS ECS

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPO: 294699501138.dkr.ecr.us-east-1.amazonaws.com/chatscroll-api
        run: |
          docker build \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            -t $ECR_REPO:latest \
            -t $ECR_REPO:${{ github.sha }} \
            ./backend

          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}

          echo "Pushed image tags:"
          echo "  $ECR_REPO:latest"
          echo "  $ECR_REPO:${{ github.sha }}"

      - name: Register new ECS task definition revision
        env:
          ECR_REPO: 294699501138.dkr.ecr.us-east-1.amazonaws.com/chatscroll-api
        run: |
          # Fetch the current task definition JSON
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition default-chatscroll-api \
            --query 'taskDefinition' \
            --output json)

          # Point the first container at the new SHA-tagged image and strip ECS read-only fields
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$ECR_REPO:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          # Register the updated definition and capture the new ARN
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered: $NEW_TASK_DEF_ARN"

          # Deploy the new revision — explicit --task-definition ensures ECS uses the new image,
          # not whatever digest the old revision was pinned to
          aws ecs update-service \
            --cluster default \
            --service chatscroll-api \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for ECS service to stabilize
        run: |
          for i in {1..40}; do
            STATUS=$(aws ecs describe-services \
              --cluster default \
              --services chatscroll-api \
              --region us-east-1 \
              --query 'services[0].deployments[0].status' \
              --output text)
            if [ "$STATUS" = "PRIMARY" ]; then
              RUNNING=$(aws ecs describe-services \
                --cluster default \
                --services chatscroll-api \
                --region us-east-1 \
                --query 'services[0].runningCount' \
                --output text)
              if [ "$RUNNING" -gt "0" ]; then
                echo "Service is stable"
                exit 0
              fi
            fi
            echo "Waiting... attempt $i (status=$STATUS)"
            sleep 15
          done
          echo "Timeout waiting for service to stabilize"
          exit 1
